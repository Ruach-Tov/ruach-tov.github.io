<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6 48 903 623" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <!-- Slot colors -->
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-red" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-yellow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </radialGradient>
    <!-- Pin marker -->
    <marker id="pin" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="4" markerHeight="4">
      <circle cx="3" cy="3" r="2.5" fill="white" opacity="0.8"/>
    </marker>
    <!-- Dispatch arrow -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 Z" fill="#e6edf3" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="150" text-anchor="middle" fill="#8b949e" font-size="15" font-weight="600">
    Architecture × Deployment × Affinity
  </text>
  <text x="450" y="170" text-anchor="middle" fill="#484f58" font-size="11">
    The polyarchitecture dispatch lattice
  </text>

  <g transform="translate(72, 63) scale(0.82)">
  <g transform="translate(0, -62)">
  <!-- === LATTICE GRID === -->
  <!-- Isometric projection: X = languages (right), Z = slots (left-back), Y = affinity (up) -->

  <!-- Grid origin at (200, 420). Spacing: X-step=(100,25), Z-step=(-55,30), Y-step=(0,-110) -->

  <!-- ============================================ -->
  <!-- LAYER: Free handles (Y=0, lower plane) -->
  <!-- ============================================ -->

  <!-- Grid lines along X (languages) for each slot — Free plane -->
  <g stroke="#30363d" stroke-width="0.6" opacity="0.5">
    <!-- Blue slot -->
    <line x1="200" y1="420" x2="600" y2="520"/>
    <!-- Green slot -->
    <line x1="145" y1="450" x2="545" y2="550"/>
    <!-- Yellow slot -->
    <line x1="90" y1="480" x2="490" y2="580"/>
    <!-- Red slot -->
    <line x1="35" y1="510" x2="435" y2="610"/>

    <!-- Grid lines along Z (slots) for each language — Free plane -->
    <line x1="200" y1="420" x2="35" y2="510"/>
    <line x1="300" y1="445" x2="135" y2="535"/>
    <line x1="400" y1="470" x2="235" y2="560"/>
    <line x1="500" y1="495" x2="335" y2="585"/>
    <line x1="600" y1="520" x2="435" y2="610"/>
  </g>

  <!-- ============================================ -->
  <!-- LAYER: Pinned handles (Y=1, upper plane) -->
  <!-- ============================================ -->

  <g stroke="#30363d" stroke-width="0.4" opacity="0.3">
    <!-- Blue slot -->
    <line x1="200" y1="310" x2="600" y2="410"/>
    <!-- Green slot -->
    <line x1="145" y1="340" x2="545" y2="440"/>
    <!-- Red slot -->
    <line x1="90" y1="370" x2="490" y2="470"/>
    <!-- Yellow slot -->
    <line x1="35" y1="400" x2="435" y2="500"/>

    <!-- Along Z for each language — Pinned plane -->
    <line x1="200" y1="310" x2="35" y2="400"/>
    <line x1="300" y1="335" x2="135" y2="425"/>
    <line x1="400" y1="360" x2="235" y2="450"/>
    <line x1="500" y1="385" x2="335" y2="475"/>
    <line x1="600" y1="410" x2="435" y2="500"/>
  </g>

  <!-- Vertical lines connecting Free ↔ Pinned planes -->
  <g stroke="#30363d" stroke-width="0.4" opacity="0.3" stroke-dasharray="3,4">
    <!-- Blue slot verticals -->
    <line x1="200" y1="310" x2="200" y2="420"/>
    <line x1="300" y1="335" x2="300" y2="445"/>
    <line x1="400" y1="360" x2="400" y2="470"/>
    <line x1="500" y1="385" x2="500" y2="495"/>
    <line x1="600" y1="410" x2="600" y2="520"/>
    <!-- Green slot verticals -->
    <line x1="145" y1="340" x2="145" y2="450"/>
    <line x1="245" y1="365" x2="245" y2="475"/>
    <line x1="345" y1="390" x2="345" y2="500"/>
    <line x1="445" y1="415" x2="445" y2="525"/>
    <line x1="545" y1="440" x2="545" y2="550"/>
  </g>

  <!-- ============================================ -->
  <!-- NODES — Free plane (lower, open circles) -->
  <!-- ============================================ -->

  <!-- Blue slot, Free — active nodes bright -->
  <!-- Zig (active in production) -->
  <circle cx="200" cy="420" r="18" fill="url(#glow-blue)"/>
  <circle cx="200" cy="420" r="7" fill="#3b82f6" opacity="1.0"/>
  <!-- Rust -->
  <circle cx="300" cy="445" r="5" fill="#3b82f6" opacity="0.25"/>
  <!-- Haskell -->
  <circle cx="400" cy="470" r="5" fill="#3b82f6" opacity="0.25"/>
  <!-- Go -->
  <circle cx="500" cy="495" r="5" fill="#3b82f6" opacity="0.25"/>
  <!-- Python (active) -->
  <circle cx="600" cy="520" r="18" fill="url(#glow-blue)"/>
  <circle cx="600" cy="520" r="7" fill="#3b82f6" opacity="1.0"/>

  <!-- Green slot, Free -->
  <!-- Zig (upgrade standby) -->
  <circle cx="145" cy="450" r="14" fill="url(#glow-green)"/>
  <circle cx="145" cy="450" r="6" fill="#22c55e" opacity="0.7"/>
  <!-- Others dim -->
  <circle cx="245" cy="475" r="4" fill="#22c55e" opacity="0.2"/>
  <circle cx="345" cy="500" r="4" fill="#22c55e" opacity="0.2"/>
  <circle cx="445" cy="525" r="4" fill="#22c55e" opacity="0.2"/>
  <circle cx="545" cy="550" r="4" fill="#22c55e" opacity="0.2"/>

  <!-- Yellow slot, Free — experimental/pre-CI -->
  <circle cx="90" cy="480" r="3" fill="#eab308" opacity="0.15"/>
  <circle cx="190" cy="505" r="3" fill="#eab308" opacity="0.15"/>
  <circle cx="290" cy="530" r="3" fill="#eab308" opacity="0.15"/>
  <circle cx="390" cy="555" r="3" fill="#eab308" opacity="0.15"/>
  <circle cx="490" cy="580" r="3" fill="#eab308" opacity="0.15"/>

  <!-- Red slot, Free — engineering/hazmat (furthest out) -->
  <circle cx="35" cy="510" r="4" fill="#ef4444" opacity="0.2"/>
  <circle cx="135" cy="535" r="4" fill="#ef4444" opacity="0.2"/>
  <!-- Haskell (hazmat active — pulsing implied by larger glow) -->
  <circle cx="235" cy="560" r="20" fill="url(#glow-red)"/>
  <circle cx="235" cy="560" r="6" fill="#ef4444" opacity="0.85"/>
  <circle cx="335" cy="585" r="4" fill="#ef4444" opacity="0.2"/>
  <circle cx="435" cy="610" r="4" fill="#ef4444" opacity="0.2"/>

  <!-- ============================================ -->
  <!-- NODES — Pinned plane (upper, filled dots) -->
  <!-- ============================================ -->

  <!-- Blue-Zig pinned handle (active — a tree-sitter session) -->
  <circle cx="200" cy="310" r="14" fill="url(#glow-blue)"/>
  <circle cx="200" cy="310" r="6" fill="#3b82f6" opacity="0.9"/>
  <circle cx="200" cy="310" r="2.5" fill="white" opacity="0.8"/>
  <!-- Ring showing pin -->
  <circle cx="200" cy="310" r="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>

  <!-- Other pinned nodes dim -->
  <circle cx="300" cy="335" r="3" fill="#3b82f6" opacity="0.12"/>
  <circle cx="400" cy="360" r="3" fill="#3b82f6" opacity="0.12"/>
  <circle cx="500" cy="385" r="3" fill="#3b82f6" opacity="0.12"/>
  <circle cx="600" cy="410" r="3" fill="#3b82f6" opacity="0.12"/>
  <circle cx="145" cy="340" r="3" fill="#22c55e" opacity="0.12"/>
  <circle cx="245" cy="365" r="3" fill="#22c55e" opacity="0.12"/>
  <circle cx="345" cy="390" r="3" fill="#22c55e" opacity="0.12"/>

  <!-- ============================================ -->
  <!-- DISPATCH RAY — a tool call being routed -->
  <!-- ============================================ -->

  <!-- Normal dispatch: agent → blue-Zig-Free -->
  <line x1="710" y1="350" x2="208" y2="418"
        stroke="#e6edf3" stroke-width="1" opacity="0.3"
        stroke-dasharray="4,6" marker-end="url(#arrow)"/>
  <text x="720" y="348" fill="#8b949e" font-size="10" font-weight="500">agent → jq_eval</text>

  <!-- Hazard dispatch: agent → red-Haskell-Free -->
  <line x1="710" y1="390" x2="241" y2="558"
        stroke="#ef4444" stroke-width="1.2" opacity="0.4"
        stroke-dasharray="2,4" marker-end="url(#arrow)"/>
  <text x="720" y="388" fill="#ef4444" font-size="10" font-weight="500" opacity="0.7">hazmat → web_fetch</text>

  <!-- Pinned dispatch: handle routes to origin -->
  <line x1="710" y1="310" x2="208" y2="312"
        stroke="#58a6ff" stroke-width="1" opacity="0.3"
        stroke-dasharray="4,6" marker-end="url(#arrow)"/>
  <text x="720" y="308" fill="#58a6ff" font-size="10" font-weight="500" opacity="0.6">pinned → get_node</text>

  <!-- ============================================ -->
  <!-- AXIS LABELS -->
  <!-- ============================================ -->

  <!-- X axis: Languages -->
  <text x="200" y="405" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600">Zig</text>
  <text x="300" y="430" text-anchor="middle" fill="#8b949e" font-size="10">Rust</text>
  <text x="400" y="455" text-anchor="middle" fill="#8b949e" font-size="10">Haskell</text>
  <text x="500" y="480" text-anchor="middle" fill="#8b949e" font-size="10">Go</text>
  <text x="600" y="505" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="600">Python</text>

  <!-- Z axis: Slots -->
  <text x="200" y="414" text-anchor="end" fill="#3b82f6" font-size="9" dx="-14">Blue</text>
  <text x="145" y="444" text-anchor="end" fill="#22c55e" font-size="9" dx="-14">Green</text>
  <text x="90" y="474" text-anchor="end" fill="#eab308" font-size="9" dx="-14">Yellow</text>
  <text x="35" y="504" text-anchor="end" fill="#ef4444" font-size="9" dx="-14">Red</text>

  <!-- Y axis: Affinity -->
  <text x="178" y="425" text-anchor="end" fill="#656d76" font-size="9">Free ○</text>
  <text x="178" y="315" text-anchor="end" fill="#656d76" font-size="9">Pinned ●</text>

  <!-- ============================================ -->
  <!-- CONVERGENCE INDICATOR -->
  <!-- ============================================ -->

  <g transform="translate(680, 480)">
    <rect x="0" y="0" width="190" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
    <text x="95" y="18" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600">Convergence</text>
    <line x1="10" y1="24" x2="180" y2="24" stroke="#30363d" stroke-width="0.5"/>

    <!-- Red == Green means all tested -->
    <circle cx="20" cy="42" r="4" fill="#ef4444"/>
    <text x="30" y="45" fill="#656d76" font-size="9">=</text>
    <circle cx="44" cy="42" r="4" fill="#22c55e"/>
    <text x="58" y="45" fill="#8b949e" font-size="9">→ all tested, ready</text>

    <!-- Blue == Green means upgrade complete -->
    <circle cx="20" cy="62" r="4" fill="#3b82f6"/>
    <text x="30" y="65" fill="#656d76" font-size="9">=</text>
    <circle cx="44" cy="62" r="4" fill="#22c55e"/>
    <text x="58" y="65" fill="#8b949e" font-size="9">→ upgrade complete</text>

    <!-- Yellow → Red means promoted past CI/CD -->
    <circle cx="20" cy="82" r="4" fill="#eab308"/>
    <text x="30" y="85" fill="#656d76" font-size="9">→</text>
    <circle cx="44" cy="82" r="4" fill="#ef4444"/>
    <text x="58" y="85" fill="#8b949e" font-size="9">→ promoted past CI</text>
  </g>

  <!-- ============================================ -->
  <!-- ANNOTATION: what the viewer is seeing -->
  <!-- ============================================ -->

  <g transform="translate(680, 440)">
    <text x="0" y="0" fill="#484f58" font-size="9" font-style="italic">
      Bright nodes are active. Dim nodes are available.
    </text>
    <text x="0" y="14" fill="#484f58" font-size="9" font-style="italic">
      Ringed nodes hold pinned handles.
    </text>
    <text x="0" y="28" fill="#484f58" font-size="9" font-style="italic">
      Dashed lines show dispatch rays.
    </text>
  </g>

  </g>
  </g>
</svg>
